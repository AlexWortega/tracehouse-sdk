name: publish

# Publishes tracehouse-sdk to PyPI via Trusted Publishing (OIDC) — no API token.
# Fires when you cut a GitHub Release; bump pyproject `version` first.
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    # Must match the "Environment name" on the PyPI trusted publisher (pypi).
    environment: pypi
    permissions:
      id-token: write # OIDC token for Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
